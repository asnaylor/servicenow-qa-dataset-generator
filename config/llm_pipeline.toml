# LLM runtime config for scripts/ray_servicenow_ticket_pipeline.py

model_source = "openai/gpt-oss-120b"
batch_size = 16
context_max_chars = 24000

[engine_kwargs]
tensor_parallel_size = 4
max_model_len = 20480
gpu_memory_utilization = 0.90
distributed_executor_backend = "mp"

[quality]
temperature = 0.0
max_tokens = 512
score_threshold = 70  # Only keep tickets with score >= 70 (0-100 scale)

[qa]
temperature = 0.1
max_tokens = 6144

[docs]
# Settings for NERSC docs retrieval (used by --docs-index in the pipeline).
# top_k: number of documentation chunks to retrieve per ticket.
# model: sentence-transformers model used to embed queries — must match what
#        was used when building the index with scripts/index_nersc_docs.py.
top_k = 3
model = "BAAI/bge-large-en-v1.5"