# Configuration for filtering ServiceNow tickets into a Q&A dataset
# Matches SQL query for consistent filtering across systems

[state]
# state IN ('Closed', 'Resolved')
allowed_states = ["Closed", "Resolved"]
require_inactive = false
allow_active_unknown = true

[close_codes]
# close_code IN ('Solved (Permanently)', 'Solved (Work Around)', 'Resolved by Requester')
allowed = [
    "Solved (Permanently)",
    "Solved (Work Around)",
    "Resolved by Requester",
]
rejected = []

[contact_types]
# contact_type IN ('User Web Interface', 'Email')
allowed = [
    "user web interface",
    "email",
]
rejected = []

[auto_generated]
# Disable auto-generated heuristics to match SQL query exactly
enabled = true
  reject_if_record_producer_present = false
  reject_if_short_description_matches = [
    "cori",
    "\\b(?:quota\\b.*\\bincrease|increase\\b.*\\bquota)\\b",
    "newt",
    "\\b(?:ip|reservation|access|database|cname)\\s+request\\b"
  ]

[content_quality]
# No length requirements to match SQL query
require_close_notes = false
min_short_description_length = 0
min_close_notes_length = 0
min_total_comments = 0

[categories]
# category NOT IN ('Account Support', 'Allocations', 'ERCAP', 'account support')
allowed = []
rejected = [
    "Account Support",
    "Allocations",
    "ERCAP",
    "account support",
    "Workstation Support",
    "Hardware"
]

[resources]
# u_resource NOT IN ('Cori', 'Gerty', 'Cori cscratch', 'Cori GPU', 'NoMachine', 'Cori Large Memory', 'Hopper', 'Edison', 'Genepool', 'NEWT')
allowed = []
rejected = [
    "Cori",
    "Gerty",
    "Cori cscratch",
    "Cori GPU",
    "NoMachine",
    "Cori Large Memory",
    "Hopper",
    "Edison",
    "Genepool",
    "NEWT",
    "JGI Web Server",
    "Cori Ex Vivo"
]
